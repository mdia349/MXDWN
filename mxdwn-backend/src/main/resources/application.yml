spring:
  application:
    name: mxdwn-api
  datasource:
    url: jdbc:postgresql://localhost:5438/mxdwn
    username: mxdwn_dev
    password: mxdwnpass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  aws:
    s3:
      bucket-name: mxdwn-bucket
    region: us-east-2
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}

  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}